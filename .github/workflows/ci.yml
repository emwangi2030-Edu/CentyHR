name: CI

on:
  push:
    branches: [main, staging]
  pull_request:
    branches: [main, staging]

permissions:
  contents: read

jobs:
  bff:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bff
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: bff/package-lock.json
      - run: npm ci
      - run: npm run build
      - run: npm test
