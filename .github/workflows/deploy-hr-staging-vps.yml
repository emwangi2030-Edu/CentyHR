# When HK-MBURU or NKGachoki push to `staging`, SSH to the app server and run
# /opt/hr-staging-deploy-safe.sh → updates /opt/centy-hr-integration-clean (bff/),
# restarts PM2 centy-hr-bff-clean, checks https://staging.centyhq.com/hr-api/health
#
# Reuses the same Actions secrets/variables as B2B-Pay-Hub (same SSH host + key).
#
name: Deploy HR BFF staging VPS

on:
  push:
    branches: [staging]
  workflow_dispatch:

concurrency:
  group: deploy-hr-staging-vps-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Gate — HK-MBURU & NKGachoki (optional extras via STAGING_AUTO_DEPLOY_ACTORS)
        id: gate
        shell: bash
        env:
          ACTORS_EXTRA: ${{ vars.STAGING_AUTO_DEPLOY_ACTORS }}
          ACTOR: ${{ github.actor }}
          EVENT: ${{ github.event_name }}
        run: |
          set -euo pipefail
          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            echo "Manual run — skipping actor allowlist."
            echo "allowed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DEFAULT_ACTORS="HK-MBURU,NKGachoki"
          if [[ -n "${ACTORS_EXTRA// }" ]]; then
            ACTORS_CSV="${DEFAULT_ACTORS},${ACTORS_EXTRA}"
          else
            ACTORS_CSV="${DEFAULT_ACTORS}"
          fi
          echo "Allowlist (merged): ${ACTORS_CSV}"
          ALLOWED=false
          IFS=',' read -ra PARTS <<< "$ACTORS_CSV"
          for p in "${PARTS[@]}"; do
            name="$(echo "$p" | xargs)"
            [[ -z "$name" ]] && continue
            if [[ "$name" == "$ACTOR" ]]; then
              ALLOWED=true
              break
            fi
          done
          if [[ "$ALLOWED" != true ]]; then
            echo "Push from '$ACTOR' is not allowlisted — skipping deploy."
            echo "allowed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Push from '$ACTOR' is allowlisted."
          echo "allowed=true" >> "$GITHUB_OUTPUT"

      - name: Require SSH configuration when deploying
        if: steps.gate.outputs.allowed == 'true'
        shell: bash
        env:
          HOST: ${{ vars.STAGING_SSH_HOST }}
          KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "${HOST:-}" ]]; then
            echo "::error::Set Actions variable STAGING_SSH_HOST (same as Pay Hub deploy)"
            missing=1
          fi
          if [[ -z "${KEY:-}" ]]; then
            echo "::error::Set Actions secret STAGING_SSH_PRIVATE_KEY (same as Pay Hub deploy)"
            missing=1
          fi
          exit "$missing"

      - name: Start ssh-agent
        if: steps.gate.outputs.allowed == 'true'
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}

      - name: Deploy CentyHR BFF staging (hr-api)
        if: steps.gate.outputs.allowed == 'true'
        shell: bash
        env:
          HOST: ${{ vars.STAGING_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ vars.STAGING_SSH_USER }}
        run: |
          set -euo pipefail
          SSH_USER="${DEPLOY_SSH_USER:-root}"
          ssh -o BatchMode=yes \
            -o StrictHostKeyChecking=accept-new \
            "${SSH_USER}@${HOST}" \
            '/opt/hr-staging-deploy-safe.sh --branch staging'

      - name: Skipped
        if: steps.gate.outputs.allowed != 'true'
        run: echo "Deploy skipped (gate)."
